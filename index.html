<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Ingreso - Preomed</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .formulario-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-height: 60px;
        }

        h2 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 30px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-col {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .alerta {
            display: none;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        .alerta.exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alerta.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .loading { display: none; text-align: center; margin-top: 15px; font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>

    <div class="formulario-container">
        <div class="logo-container">
            <img src="https://www.preomed.cl/wp-content/uploads/2025/05/350px-rgb-min.webp" alt="Logo Preomed">
        </div>
        
        <h2>Ficha de Ingreso de Trabajador</h2>

        <form id="formulario-ingreso">
            
            <div class="form-row">
                <div class="form-col form-group">
                    <label for="rut">RUT (Ej: 12345678-9)</label>
                    <input type="text" id="rut" name="rut" required placeholder="Sin puntos y con guion">
                </div>
            </div>

            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" required>
            </div>

            <div class="form-row">
                <div class="form-col form-group">
                    <label for="apellidoPaterno">Apellido Paterno</label>
                    <input type="text" id="apellidoPaterno" name="apellidoPaterno" required>
                </div>
                <div class="form-col form-group">
                    <label for="apellidoMaterno">Apellido Materno</label>
                    <input type="text" id="apellidoMaterno" name="apellidoMaterno" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col form-group">
                    <label for="telefono">Teléfono Celular</label>
                    <input type="text" id="telefono" name="telefono" required placeholder="+56 9...">
                </div>
                <div class="form-col
