<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Ingreso - Preomed</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .formulario-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-height: 60px;
        }

        h2 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 30px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }

        h3 {
            color: #495057;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-col {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 30px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .alerta {
            display: none;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        .alerta.exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alerta.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .loading { display: none; text-align: center; margin-top: 15px; font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>

    <div class="formulario-container">
        <div class="logo-container">
            <img src="https://www.preomed.cl/wp-content/uploads/2025/05/350px-rgb-min.webp" alt="Logo Preomed">
        </div>
        
        <h2>Ficha de Ingreso de Trabajador</h2>

        <form id="formulario-ingreso">
            
            <h3>1. Datos Personales</h3>
            <div class="form-row">
                <div class="form-col form-group">
                    <label for="rut">RUT (Ej: 12345678-9)</label>
                    <input type="text" id="rut" name="rut" required placeholder="Sin puntos y con guion">
                </div>
                <div class="form-col form-group">
                    <label for="nacionalidad">Nacionalidad</label>
                    <input type="text" id="nacionalidad" name="nacionalidad" required placeholder="Ej: Chilena">
                </div>
            </div>

            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" required>
            </div>

            <div class="form-row">
                <div class="form-col form-group">
                    <label for="apellidoPaterno">Apellido Paterno</label>
                    <input type="text" id="apellidoPaterno" name="apellidoPaterno" required>
                </div>
                <div class="form-col form-group">
                    <label for="apellidoMaterno">Apellido Materno</label>
                    <input type="text" id="apellidoMaterno" name="apellidoMaterno" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col form-group">
                    <label for="fechaNacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                </div>
                <div class="form-col form-group">
                    <label for="estadoCivil">Estado Civil</label>
                    <select id="estadoCivil" name="estadoCivil" required>
                        <option value="">-- Seleccione Estado Civil --</option>
                        <option value="Soltero/a">Soltero/a</option>
                        <option value="Casado/a">Casado/a</option>
                        <option value="Divorciado/a">Divorciado/a</option>
                        <option value="Viudo/a">Viudo/a</option>
                        <option value="Conviviente Civil">Conviviente Civil</option>
                    </select>
                </div>
            </div>

            <h3>2. Datos de Contacto</h3>
            <div class="form-group">
                <label for="direccion">Dirección Particular</label>
                <input type="text" id="direccion" name="direccion" required placeholder="Calle, Número, Comuna">
            </div>

            <div class="form-row">
                <div class="form-col form-group">
                    <label for="telefono">Teléfono Celular</label>
                    <input type="text" id="telefono" name="telefono" required placeholder="+56 9...">
                </div>
                <div class="form-col form-group">
                    <label for="correo">Correo Electrónico Personal</label>
                    <input type="email" id="correo" name="correo" required>
                </div>
            </div>

            <h3>3. Datos Laborales</h3>
            <div class="form-row">
                <div class="form-col form-group">
                    <label for="fechaIngreso">Fecha de Ingreso</label>
                    <input type="date" id="fechaIngreso" name="fechaIngreso" required>
                </div>
                <div class="form-col form-group">
                    <label for="plazoContrato">Plazo de Contrato</label>
                    <select id="plazoContrato" name="plazoContrato" required>
                        <option value="">-- Seleccione --</option>
                        <option value="Plazo Fijo">Plazo Fijo</option>
                        <option value="Indefinido">Indefinido</option>
                        <option value="Por Obra o Faena">Por Obra o Faena</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="sucursal">Sucursal / Centro de Costo</label>
                <select id="sucursal" name="sucursal" required>
                    <option value="">-- Seleccione Sucursal --</option>
                    <option value="Preomed Arica">Preomed Arica</option>
                    <option value="Preomed Antofagasta Centro">Preomed Antofagasta Centro</option>
                    <option value="Preomed Antofagasta Norte">Preomed Antofagasta Norte</option>
                    <option value="Preomed Calama">Preomed Calama</option>
                    <option value="Preomed Concepción">Preomed Concepción</option>
                    <option value="Preomed Copiapó">Preomed Copiapó</option>
                    <option value="Preomed Iquique">Preomed Iquique</option>
                    <option value="Preomed La Serena">Preomed La Serena</option>
                    <option value="Preomed Ovalle">Preomed Ovalle</option>
                    <option value="Preomed Providencia">Preomed Providencia</option>
                    <option value="Preomed Puerto Montt">Preomed Puerto Montt</option>
                    <option value="Preomed Salamanca">Preomed Salamanca</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-col form-group">
                    <label for="cargo">Cargo</label>
                    <select id="cargo" name="cargo" required>
                        <option value="">-- Seleccione Cargo --</option>
                        <option value="Administrativo/a - Recepcionista">Administrativo/a - Recepcionista</option>
                        <option value="Asesor/a Comunicacional - Marketing y Publicidad">Asesor/a Comunicacional - Marketing y Publicidad</option>
                        <option value="Asistente Administrativo/a">Asistente Administrativo/a</option>
                        <option value="Auxiliar de Aseo">Auxiliar de Aseo</option>
                        <option value="Asistente de Finanzas">Asistente de Finanzas</option>
                        <option value="Coordinador/a de Operaciones">Coordinador/a de Operaciones</option>
                        <option value="Coordinador/a de Atención al Cliente">Coordinador/a de Atención al Cliente</option>
                        <option value="Director/a Técnico/a de Laboratorio">Director/a Técnico/a de Laboratorio</option>
                        <option value="Ejecutivo/a Comercial">Ejecutivo/a Comercial</option>
                        <option value="Ejecutivo/a de Ventas B2C - B2B">Ejecutivo/a de Ventas B2C - B2B</option>
                        <option value="Enfermero/a">Enfermero/a</option>
                        <option value="Enfermero/a Dirección Técnica">Enfermero/a Dirección Técnica</option>
                        <option value="Especialista en Fonoaudiología">Especialista en Fonoaudiología</option>
                        <option value="Especialista en Psicología">Especialista en Psicología</option>
                        <option value="Gerente Comercial">Gerente Comercial</option>
                        <option value="Gerente de Administración y Finanzas">Gerente de Administración y Finanzas</option>
                        <option value="Gerente de Operaciones">Gerente de Operaciones</option>
                        <option value="Gerente General">Gerente General</option>
                        <option value="Jefe/a de Sucursal">Jefe/a de Sucursal</option>
                        <option value="KAM (Key Account Manager)">KAM (Key Account Manager)</option>
                        <option value="KAM (Key Account Manager) Senior">KAM (Key Account Manager) Senior</option>
                        <option value="Médico Especialista en Salud Laboral">Médico Especialista en Salud Laboral</option>
                        <option value="Recepcionista">Recepcionista</option>
                        <option value="Recepcionista - TENS">Recepcionista - TENS</option>
                        <option value="Secretaria - Recepcionista">Secretaria - Recepcionista</option>
                        <option value="Subgerente Comercial">Subgerente Comercial</option>
                        <option value="Subgerente General">Subgerente General</option>
                        <option value="Supervisor/a de Sucursal">Supervisor/a de Sucursal</option>
                        <option value="Técnico en enfermería nivel superior">Técnico en enfermería nivel superior</option>
                        <option value="Tecnólogo/a Médico">Tecnólogo/a Médico</option>
                        <option value="Tecnólogo Médico-Otorrino">Tecnólogo Médico-Otorrino</option>
                        <option value="TENS - Administrativo/a">TENS - Administrativo/a</option>
                    </select>
                </div>
                
                <div class="form-col form-group">
                    <label for="jornada">Jornada Laboral</label>
                    <select id="jornada" name="jornada" required>
                        <option value="">-- Seleccione Jornada --</option>
                        <option value="Lunes a Jueves de 08:00 a 17:00 hrs. - Viernes de 08:00 a 16:00 hrs. - Sábado de 09:00 a 12:00 hrs.">Lunes a Jueves de 08:00 a 17:00 hrs. - Viernes de 08:00 a 16:00 hrs. - Sábado de 09:00 a 12:00 hrs.</option>
                        <option value="Lunes a Martes de 08:00 a 18:00 hrs. - Miércoles a Viernes de 08:00 a 17:00 hrs.">Lunes a Martes de 08:00 a 18:00 hrs. - Miércoles a Viernes de 08:00 a 17:00 hrs.</option>
                        <option value="Lunes a Viernes de 08:00 a 13:00 hrs. - Sábado de 09:00 a 12:00 hrs.">Lunes a Viernes de 08:00 a 13:00 hrs. - Sábado de 09:00 a 12:00 hrs.</option>
                        <option value="Lunes a Viernes de 08:00 a 13:00 hrs. - Sábado de 08:30 a 12:30 hrs.">Lunes a Viernes de 08:00 a 13:00 hrs. - Sábado de 08:30 a 12:30 hrs.</option>
                        <option value="Lunes a Sábado de 08:00 a 13:00 hrs.">Lunes a Sábado de 08:00 a 13:00 hrs.</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="sueldo">Sueldo Líquido Pactado ($)</label>
                <input type="number" id="sueldo" name="sueldo" required placeholder="Ej: 800000">
            </div>

            <h3>4. Previsión y Salud</h3>
            <div class="form-row">
                <div class="form-col form-group">
                    <label for="afp">AFP</label>
                    <select id="afp" name="afp" required>
                        <option value="">-- Seleccione AFP --</option>
                        <option value="Capital">Capital</option>
                        <option value="Cuprum">Cuprum</option>
                        <option value="Habitat">Habitat</option>
                        <option value="Modelo">Modelo</option>
                        <option value="PlanVital">PlanVital</option>
                        <option value="Provida">Provida</option>
                        <option value="Uno">Uno</option>
                    </select>
                </div>
                <div class="form-col form-group">
                    <label for="salud">Sistema de Salud</label>
                    <select id="salud" name="salud" required>
                        <option value="">-- Seleccione Salud --</option>
                        <option value="Fonasa">Fonasa</option>
                        <option value="Banmédica">Isapre Banmédica</option>
                        <option value="Colmena">Isapre Colmena</option>
                        <option value="Consalud">Isapre Consalud</option>
                        <option value="Cruz Blanca">Isapre Cruz Blanca</option>
                        <option value="Nueva Masvida">Isapre Nueva Masvida</option>
                        <option value="Vida Tres">Isapre Vida Tres</option>
                    </select>
                </div>
            </div>

            <h3>5. Datos Bancarios</h3>
            <div class="form-row">
                <div class="form-col form-group">
                    <label for="banco">Institución Bancaria</label>
                    <select id="banco" name="banco" required>
                        <option value="">-- Seleccione Banco --</option>
                        <option value="BancoEstado">BancoEstado</option>
                        <option value="Banco de Chile">Banco de Chile</option>
                        <option value="Banco Santander">Banco Santander</option>
                        <option value="BCI">BCI</option>
                        <option value="Itaú">Itaú</option>
                        <option value="Scotiabank">Scotiabank</option>
                        <option value="Banco Falabella">Banco Falabella</option>
                        <option value="Banco BICE">Banco BICE</option>
                        <option value="Tenpo">Tenpo</option>
                        <option value="Mach">Mach</option>
                    </select>
                </div>
                <div class="form-col form-group">
                    <label for="numeroCuenta">N° de Cuenta</label>
                    <input type="text" id="numeroCuenta" name="numeroCuenta" required placeholder="Ej: 123456789">
                </div>
            </div>

            <button type="submit" id="btn-enviar">Registrar Ingreso</button>
            <div id="loading" class="loading">Enviando datos a la base de datos, por favor espere...</div>
            <div id="mensaje-alerta" class="alerta"></div>
            
        </form>
    </div>

    <script>
        // ¡NUEVO LINK COLOCADO AQUÍ!
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwBeOnZYKZsa90W35aHZPhfcuAdRR-OqyprNK7ayPs_VV4X95iXjL24edQpH0JpraNa9A/exec';
        
        const form = document.getElementById('formulario-ingreso');
        const btnEnviar = document.getElementById('btn-enviar');
        const loading = document.getElementById('loading');
        const alerta = document.getElementById('mensaje-alerta');

        form.addEventListener('submit', e => {
            e.preventDefault(); 
            
            btnEnviar.style.display = 'none';
            loading.style.display = 'block';
            alerta.style.display = 'none';

            const formData = new FormData(form);
            const dataObj = Object.fromEntries(formData.entries());

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dataObj)
            })
            .then(response => {
                loading.style.display = 'none';
                btnEnviar.style.display = 'block';
                alerta.className = 'alerta exito';
                alerta.innerText = '¡Ficha de ingreso guardada exitosamente!';
                alerta.style.display = 'block';
                
                form.reset();
                setTimeout(() => { alerta.style.display = 'none'; }, 5000);
            })
            .catch(error => {
                loading.style.display = 'none';
                btnEnviar.style.display = 'block';
                alerta.className = 'alerta error';
                alerta.innerText = 'Hubo un error al guardar. Inténtelo de nuevo.';
                alerta.style.display = 'block';
                console.error('Error!', error.message);
            });
        });
    </script>
</body>
</html>
